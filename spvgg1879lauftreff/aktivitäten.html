<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1e3a8a">
    <title>Laufaktivitäten – Spvgg. Hainstadt</title>
    <link rel="stylesheet" href="/assets/css/lauftreff-base.css">
    <link rel="stylesheet" href="/assets/css/public.css">
</head>
<body>

<header class="public-topbar">
    <div class="public-topbar-inner">
        <a href="/" class="public-brand">Spvgg. Hainstadt Lauftreff</a>
        <a href="/training/" class="btn btn-accent btn-sm">Mitgliederbereich →</a>
    </div>
</header>

<main class="public-page">
    <div class="container">

        <div class="page-header">
            <h1>Laufaktivitäten</h1>
            <p>Alle erfassten Läufe der Spvgg. Hainstadt — auf Mobile als Karten, auf Desktop als Tabelle.</p>
            <a href="chart.html" class="view-switch">↗ Als Grafik anzeigen</a>
        </div>

        <div class="card">
            <div id="aktivitaeten" class="muted">Lade Aktivitäten …</div>
        </div>

        <p style="margin-top: var(--space-4);">
            <a href="/" class="btn btn-ghost">← Zur Übersicht</a>
        </p>

    </div>
</main>

<footer class="public-footer">
    <p>&copy; Spvgg. 1879 Hainstadt — Lauftreff</p>
</footer>

<script>
fetch('aktivitaeten.php')
    .then(r => r.text())
    .then(html => {
        document.getElementById('aktivitaeten').innerHTML = html;
        document.getElementById('aktivitaeten').classList.remove('muted');
    })
    .catch(() => {
        document.getElementById('aktivitaeten').innerHTML =
            '<p class="muted">Konnte Aktivitäten gerade nicht laden — bitte später erneut probieren.</p>';
    });
</script>

</body>
</html>
