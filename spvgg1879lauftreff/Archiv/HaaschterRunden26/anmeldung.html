<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1e3a8a" />
  <title>Anmeldung Haaschter Runden 2026</title>
  <link rel="stylesheet" href="/assets/css/lauftreff-base.css">
  <link rel="stylesheet" href="/assets/css/public.css">
  <style>
    .form-card {
      max-width: 420px;
      margin: var(--space-6) auto 0;
    }
    .form-card h1 {
      text-align: center;
      margin-bottom: var(--space-5);
    }
    .form-card label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: var(--space-1);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-card input[type="text"],
    .form-card select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.95rem;
      background: #fff;
      margin-bottom: var(--space-3);
      box-sizing: border-box;
    }
    .form-card input:focus,
    .form-card select:focus {
      outline: 2px solid var(--blue);
      outline-offset: -1px;
      border-color: var(--blue);
    }
    .form-card .btn-block {
      margin-top: var(--space-2);
    }
    .form-card .back-link {
      display: block;
      text-align: center;
      margin-top: var(--space-4);
      color: var(--muted);
      font-size: 0.9rem;
    }
    .form-card .back-link:hover {
      color: var(--blue);
    }
  </style>
</head>
<body>

<header class="public-topbar">
    <div class="public-topbar-inner">
        <a href="/" class="public-brand">Spvgg. Hainstadt Lauftreff</a>
        <a href="index.html" class="btn btn-ghost btn-sm">← Zurück</a>
    </div>
</header>

<main class="public-page">
    <div class="container">
        <div class="card form-card">
            <h1>Anmeldung Haaschter Runden 2026</h1>
            <form action="anmeldung.php" method="post">
                <label for="vorname">Vorname</label>
                <input type="text" id="vorname" name="vorname" required maxlength="60" placeholder="Vorname" />

                <label for="name">Nachname</label>
                <input type="text" id="name" name="name" required maxlength="60" placeholder="Nachname" />

                <label for="disziplin">Laufen oder Walken</label>
                <select id="disziplin" name="disziplin" required>
                    <option value="" disabled selected>Bitte wählen</option>
                    <option value="laufen">Laufen</option>
                    <option value="walken">Walken</option>
                </select>

                <button type="submit" class="btn btn-primary btn-block">Anmelden</button>
            </form>
            <a href="index.html" class="back-link">← Zurück zur Übersicht</a>
        </div>
    </div>
</main>

<footer class="public-footer">
    <p>&copy; Spvgg. 1879 Hainstadt — Lauftreff</p>
</footer>

</body>
</html>
