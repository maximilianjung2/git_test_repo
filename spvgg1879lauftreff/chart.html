<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1e3a8a">
    <title>Einzelläufe – Spvgg. Hainstadt</title>
    <link rel="stylesheet" href="/assets/css/lauftreff-base.css">
    <link rel="stylesheet" href="/assets/css/public.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="public-topbar">
    <div class="public-topbar-inner">
        <a href="/" class="public-brand">Spvgg. Hainstadt Lauftreff</a>
        <a href="/training/" class="btn btn-accent btn-sm">Mitgliederbereich →</a>
    </div>
</header>

<main class="public-page">
    <div class="container">

        <div class="page-header">
            <h1>Einzelläufe</h1>
            <p>Alle erfassten Läufe der Spvgg. Hainstadt im Überblick.</p>
            <a href="aktivit&auml;ten.html" class="view-switch">↗ Als Tabelle anzeigen</a>
        </div>

        <div class="card">
            <div class="chart-wrapper">
                <canvas id="laufChart"></canvas>
            </div>
        </div>

        <p style="margin-top: var(--space-4);">
            <a href="/" class="btn btn-ghost">← Zur Übersicht</a>
        </p>

    </div>
</main>

<footer class="public-footer">
    <p>&copy; Spvgg. 1879 Hainstadt — Lauftreff</p>
</footer>

<script>
fetch('chart_data.php')
    .then(response => response.json())
    .then(json => {
        const ctx = document.getElementById('laufChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: json.labels,
                datasets: [{
                    label: 'Kilometer',
                    data: json.data,
                    backgroundColor: 'rgba(30, 64, 175, 0.65)',
                    borderColor: 'rgba(30, 58, 138, 1)',
                    borderWidth: 1,
                    borderRadius: 4,
                    barPercentage: 0.7,
                    categoryPercentage: 0.75
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        ticks: {
                            maxRotation: 60,
                            minRotation: 45,
                            autoSkip: true,
                            color: '#64748b'
                        },
                        grid: { display: false }
                    },
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: 'Kilometer', color: '#64748b' },
                        ticks: { color: '#64748b' },
                        grid: { color: '#e2e8f0' }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#1e3a8a',
                        callbacks: { title: items => items[0].label }
                    }
                }
            }
        });
    });
</script>

</body>
</html>
